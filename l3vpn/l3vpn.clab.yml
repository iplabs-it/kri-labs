name: l3vpn

topology:
  defaults:
    kind: linux
  nodes:
    R1:
      image: frr
      memory: 70mb
      binds: 
      - daemons:/etc/frr/daemons
      - R1.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
      - sysctl -w net.mpls.conf.lo.input=1
      - sysctl -w net.mpls.conf.eth1.input=1
      - sysctl -w net.mpls.platform_labels=1048575
      - ip link add blue type vrf table 1
      - ip link set eth2 vrf blue
      - ip link set blue up
    R2:
      image: frr
      memory: 70mb
      binds: 
      - daemons:/etc/frr/daemons
      - R2.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
      - sysctl -w net.mpls.conf.lo.input=1
      - sysctl -w net.mpls.conf.eth1.input=1
      - sysctl -w net.mpls.platform_labels=1048575
      - ip link add blue type vrf table 1
      - ip link set eth2 vrf blue
      - ip link set blue up
    R3:
      image: frr
      memory: 70mb
      binds: 
      - daemons:/etc/frr/daemons
      - R3.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
      - sysctl -w net.mpls.conf.lo.input=1
      - sysctl -w net.mpls.conf.eth1.input=1
      - sysctl -w net.mpls.conf.eth2.input=1
      - sysctl -w net.mpls.conf.eth3.input=1
      - sysctl -w net.mpls.platform_labels=1048575
    R4:
      image: frr
      memory: 70mb
      binds: 
      - daemons:/etc/frr/daemons
      - R4.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
      - sysctl -w net.mpls.conf.lo.input=1
      - sysctl -w net.mpls.conf.eth1.input=1
      - sysctl -w net.mpls.conf.eth2.input=1
      - sysctl -w net.mpls.platform_labels=1048575
    R5:
      image: frr
      memory: 70mb
      binds: 
      - daemons:/etc/frr/daemons
      - R5.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
      - sysctl -w net.mpls.conf.lo.input=1
      - sysctl -w net.mpls.conf.eth1.input=1
      - sysctl -w net.mpls.platform_labels=1048575
      - ip link add blue type vrf table 1
      - ip link add red type vrf table 2
      - ip link set eth2 vrf blue
      - ip link set blue up
    CB1:
      image: frr
      memory: 70mb
      binds: 
      - daemons:/etc/frr/daemons
      - CB1.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    CB2:
      image: frr
      memory: 70mb
      binds: 
      - daemons:/etc/frr/daemons
      - CB2.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    CB3:
      image: frr
      memory: 70mb
      binds: 
      - daemons:/etc/frr/daemons
      - CB3.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    HB1:
      image: vpc
      memory: 10mb
      exec:
      - ip addr add 172.16.1.200/24 dev eth1
      - ip route replace 0/0 via 172.16.1.1
      - ip route del 172.20.20.0/24 dev eth0
    HB2:
      image: vpc
      memory: 10mb
      exec:
      - ip addr add 172.16.2.200/24 dev eth1
      - ip route replace 0/0 via 172.16.2.1
      - ip route del 172.20.20.0/24 dev eth0
    HB3:
      image: vpc
      memory: 10mb
      exec:
      - ip addr add 172.16.3.200/24 dev eth1
      - ip route replace 0/0 via 172.16.3.1
      - ip route del 172.20.20.0/24 dev eth0
  links:
    - endpoints: ["R1:eth1", "R3:eth1"]
    - endpoints: ["R2:eth1", "R3:eth2"]
    - endpoints: ["R3:eth3", "R4:eth1"]
    - endpoints: ["R4:eth2", "R5:eth1"]
    - endpoints: ["R1:eth2", "CB1:eth1"]
    - endpoints: ["R2:eth2", "CB2:eth1"]
    - endpoints: ["R5:eth2", "CB3:eth1"]
    - endpoints: ["CB1:eth2", "HB1:eth1"]
    - endpoints: ["CB2:eth2", "HB2:eth1"]
    - endpoints: ["CB3:eth2", "HB3:eth1"]