name: isis

topology:
  nodes:
    R1:
      kind: linux
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R1.conf:/etc/frr/frr.conf
      exec:
      - ip link add lo1 type dummy
      - ip link add lo2 type dummy
      - ip link add lo3 type dummy
      - ip link add lo4 type dummy
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    R2:
      kind: linux
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R2.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    R3:
      kind: linux
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R3.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    R4:
      kind: linux
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R4.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    R5:
      kind: linux
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R5.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    R6:
      kind: linux
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R6.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    PC1:
      kind: linux
      image: vpc
      memory: 30m
      exec:
      - ip addr add 192.168.1.2/24 dev eth1
      - ip route replace 0/0 via 192.168.1.1
      - ip route del 172.20.20.0/24 dev eth0
    PC2:
      kind: linux
      image: vpc
      memory: 30m
      exec:
      - ip addr add 192.168.2.2/24 dev eth1
      - ip route replace 0/0 via 192.168.2.1
      - ip route del 172.20.20.0/24 dev eth0
    PC3:
      kind: linux
      image: vpc
      memory: 30m
      exec:
      - ip addr add 192.168.3.2/24 dev eth1
      - ip route replace 0/0 via 192.168.3.1
      - ip route del 172.20.20.0/24 dev eth0
    BR:
      kind: bridge
  links:
    - endpoints: ["R1:eth1", "BR:eth1"]
    - endpoints: ["R3:eth1", "BR:eth2"]
    - endpoints: ["R2:eth1", "BR:eth3"]
    - endpoints: ["R2:eth2", "R4:eth1"]
    - endpoints: ["R2:eth3", "R6:eth1"]
    - endpoints: ["R4:eth2", "R6:eth2"]
    - endpoints: ["R4:eth3", "R5:eth1"]
    - endpoints: ["R6:eth3", "R5:eth2"]
    - endpoints: ["R1:eth2", "PC1:eth1"]
    - endpoints: ["R5:eth3", "PC2:eth1"]
    - endpoints: ["R6:eth4", "PC3:eth1"]
