service integrated-vtysh-config
frr defaults traditional
hostname R6
no ipv6 forwarding
!
interface eth1
 ip address 10.0.26.6/24
exit
!
interface eth2
 ip address 10.0.46.6/24
exit
!
interface eth3
 ip address 10.0.56.6/24
exit
!
interface eth4
 ip address 192.168.3.1/24
exit
!
interface lo
 ip address 10.0.6.1/32
exit
!
