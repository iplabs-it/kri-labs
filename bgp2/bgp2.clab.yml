name: bgp2

topology:
  defaults:
    kind: linux
  nodes:
    R1:
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R1.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    R2:
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R2.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    R3:
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R3.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    R4:
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R4.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    R5:
      image: frr
      memory: 70m
      binds:
      - daemons:/etc/frr/daemons
      - R5.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    CE11:
      image: frr
      binds: 
      - daemons:/etc/frr/daemons
      - CE11.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    CE21:
      image: frr
      binds: 
      - daemons:/etc/frr/daemons
      - CE21.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    CE22:
      image: frr
      binds: 
      - daemons:/etc/frr/daemons
      - CE22.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    CE33:
      image: frr
      binds: 
      - daemons:/etc/frr/daemons
      - CE33.conf:/etc/frr/frr.conf
      exec:
      - ip route del 0.0.0.0/0
      - ip route del 172.20.20.0/24 dev eth0
    H11:
      image: vpc
      memory: 10m
      exec:
      - ip addr add 172.1.0.200/24 dev eth1
      - ip route replace 0/0 via 172.1.0.1
      - ip route del 172.20.20.0/24 dev eth0
    H21:
      image: vpc
      memory: 10m
      exec:
      - ip addr add 172.4.0.200/24 dev eth1
      - ip route replace 0/0 via 172.4.0.1
      - ip route del 172.20.20.0/24 dev eth0
    H22:
      image: vpc
      memory: 10m
      exec:
      - ip addr add 172.4.1.200/24 dev eth1
      - ip route replace 0/0 via 172.4.1.1
      - ip route del 172.20.20.0/24 dev eth0
    H33:
      image: vpc
      memory: 10m
      exec:
      - ip addr add 172.4.2.200/24 dev eth1
      - ip route replace 0/0 via 172.4.2.1
      - ip route del 172.20.20.0/24 dev eth0
  links:
    - endpoints: ["R1:eth2", "CE11:eth1"]
    - endpoints: ["R1:eth1", "R4:eth1"]
    - endpoints: ["R1:eth3", "R5:eth1"]
    - endpoints: ["R4:eth2", "R2:eth1"]
    - endpoints: ["R4:eth3", "R3:eth1"]
    - endpoints: ["R5:eth2", "R3:eth2"]
    - endpoints: ["R2:eth2", "R3:eth3"]
    - endpoints: ["R2:eth3", "CE21:eth1"]
    - endpoints: ["R2:eth4", "CE22:eth1"]
    - endpoints: ["R3:eth4", "CE33:eth1"]
    - endpoints: ["CE11:eth2", "H11:eth1"]
    - endpoints: ["CE21:eth2", "H21:eth1"]
    - endpoints: ["CE22:eth2", "H22:eth1"]
    - endpoints: ["CE33:eth2", "H33:eth1"]
