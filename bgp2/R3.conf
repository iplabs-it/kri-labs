service integrated-vtysh-config
frr defaults traditional
hostname R3
no ipv6 forwarding
!
interface eth1
 ip address 20.0.34.1/30
exit
!
interface eth2
 ip address 20.0.35.1/30
exit
!
interface eth3
 ip address 20.0.23.2/30
exit
!
interface eth4
 ip address 10.0.133.1/30
exit
!
interface lo
 ip address 3.3.3.3/32
exit
!
router ospf
 network 20.0.34.0/30 area 0
 network 20.0.35.0/30 area 0
 network 20.0.23.0/30 area 0
 network 3.3.3.3/32 area 0
exit
!
router bgp 200
 no bgp ebgp-requires-policy
 neighbor 10.0.133.2 remote-as 33
 neighbor 4.4.4.4 remote-as 200
 neighbor 4.4.4.4 update-source lo
 neighbor 4.4.4.4 next-hop-self
 neighbor 5.5.5.5 remote-as 200
 neighbor 5.5.5.5 update-source lo
 neighbor 5.5.5.5 next-hop-self
 neighbor 2.2.2.2 remote-as 200
 neighbor 2.2.2.2 update-source lo
 neighbor 2.2.2.2 next-hop-self
exit
!





