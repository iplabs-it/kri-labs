service integrated-vtysh-config
frr defaults traditional
hostname CE11
no ipv6 forwarding
!
interface eth1
 ip address 10.0.111.2/30
exit
!
interface eth2
 ip address 172.1.0.1/24
exit
!
interface lo
 ip address 11.11.11.11/32
exit
!
router bgp 11
 no bgp ebgp-requires-policy
 neighbor 10.0.111.1 remote-as 100
 network 172.1.0.0/24
exit
!







